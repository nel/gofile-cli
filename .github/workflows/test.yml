name: Test

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: ShellCheck
        run: shellcheck gofile tests/*.sh
      - name: Tests
        run: ./tests/test_gofile.sh
